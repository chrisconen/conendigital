    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --cyan: #00f0ff;
            --magenta: #bf00ff;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--black);
            color: var(--white);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            border: 3px solid var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(0, 240, 255, 0); }
        }
        
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        h1 span {
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 500px;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .btn {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 1rem 2rem;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            color: var(--black);
            text-decoration: none;
            transition: all 0.4s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.3);
        }
        

        .footer-social {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .footer-social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .footer-social-link:hover { color: var(--cyan); }
        .footer-social-link svg { display: block; }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .footer a {
            color: var(--cyan);
            text-decoration: none;
        }
    </style>
</head>
